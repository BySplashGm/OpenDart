name: opendart
description: "OpenDart - Offline-first darts scoring app with Balatro-style gameplay."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Local storage
  sqflite: ^2.3.3
  path: ^1.9.0

  # State management
  flutter_riverpod: ^2.6.1

  # UI / animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
