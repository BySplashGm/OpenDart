version: 2
updates:
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      semver-patch-days: 1
      semver-minor-days: 7
      semver-major-days: 14
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      semver-patch-days: 1
      semver-minor-days: 7
      semver-major-days: 14
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10
